<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Shop UA | Магазин</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="container">
            <h1 class="logo">3D Shop UA</h1>
            <div class="nav-links">
                <a href="pages/gallery.html" class="nav-link-btn">🖼️ Галерея</a>
                <a href="https://t.me/printingsnshop" target="_blank" class="nav-link-btn tg-btn">📢 Telegram</a>
            </div>
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="Пошук моделей...">
            </div>
            <div class="categories" id="categories-box">
                <button class="cat-btn active" data-cat="all">Всі</button>
                <button class="cat-btn" data-cat="flexi">🦎 Флексі</button>
                <button class="cat-btn" data-cat="toys">🧸 Іграшки</button>
                <button class="cat-btn" data-cat="sale">🔥 Акції</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="grid" id="grid"></div>
    </main>

    <div class="modal" id="product-modal">
        <div class="modal-content">
            <span class="close-btn" id="close-modal-btn">&times;</span>
            <div class="slider-container"><span class="close-btn" onclick="closeProduct()">&times;</span>
                <div class="slides" id="product-slides"></div>
            </div>
            <div class="product-info">
                <h2 id="p-title"></h2>
                <p id="p-desc"></p>
                <div id="p-price-cont" class="modal-price"></div>
                <button class="main-btn" id="add-to-cart-action">Додати у кошик</button>
            </div>
        </div>
    </div>

    <div class="mobile-nav">
        <a href="index.html" class="nav-btn-link">🏠 Головна</a>
        <a href="reviews.html" class="nav-btn-link">⭐ Відгуки</a>
        <a href="cart.html" class="nav-btn-link">
            🛒 Кошик <span id="cart-count">0</span>
        </a>
       
    </div>
	

    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
